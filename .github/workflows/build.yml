name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Master Build Process
        run: |
          # 1. Purana kachra saaf karke ekdum naya Android system banana
          rm -rf android
          flutter create . --org com.joyful

          # 2. Firebase ki chabi (json) dhoondh kar sahi jagah rakhna
          find . -name "google-services.json" -exec cp {} android/app/ \;

          # 3. Firebase ID Match karna naye (.kts) system mein
          sed -i 's/applicationId = ".*"/applicationId = "com.joyful.travelapp"/g' android/app/build.gradle.kts

          # 4. Internet Permission daalna (Taki black screen hamesha ke liye khatam ho)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

          # 5. Firebase Plugins ko naye (.kts) format mein add karna
          sed -i '/plugins {/a \    id("com.google.gms.google-services") version "4.4.1" apply false' android/settings.gradle.kts
          sed -i '/plugins {/a \    id("com.google.gms.google-services")' android/app/build.gradle.kts

          # 6. Final Build APK
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: Joyful-Travel-App-Final
          path: build/app/outputs/flutter-apk/app-release.apk
