name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      # 1. Bilkul naya project builder ke main folder mein banana
      - run: flutter create . --project-name=joyful_travel_app --org com.joyful

      # 2. Asli files ko naye project mein overwrite karna
      - run: |
          cp joyful_travel_app/lib/main.dart lib/main.dart
          cp joyful_travel_app/pubspec.yaml pubspec.yaml
          find . -name "google-services.json" -exec cp {} android/app/ \;

      # 3. Permissions, Firebase aur ID theek karna
      - run: |
          sed -i 's/com.example.joyful_travel_app/com.joyful.travelapp/g' android/app/build.gradle
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.3.15"' android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          flutter pub get
          flutter build apk --release

      # 4. Final APK ready karna
      - uses: actions/upload-artifact@v4
        with:
          name: Joyful-Travel-App-Final
          path: build/app/outputs/flutter-apk/app-release.apk
