name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Hard Reset & Launcher Fix
        run: |
          # 1. Purana sab kuch mita kar naya setup banana
          rm -rf android .dart_tool
          flutter create . --org com.joyful --project-name joyful_travel_app

          # 2. JSON Chabi ko sahi jagah rakhna
          find . -name "google-services.json" -exec cp {} android/app/ \;

          # 3. JSON se asli package name nikalna
          ASLI_NAAM=$(grep -o '"package_name": *"[^"]*"' android/app/google-services.json | cut -d'"' -f4 | head -n 1)
          echo "Asli Package Name: $ASLI_NAAM"

          # 4. Android Manifest mein Launcher Fix (Sabse important)
          # Isse Android ko pata chalega ki app kahan se open karni hai
          sed -i "s/package=\".*\"/package=\"$ASLI_NAAM\"/g" android/app/src/main/AndroidManifest.xml
          
          # 5. Build.gradle (Kotlin) settings theek karna
          sed -i "s/applicationId = \".*\"/applicationId = \"$ASLI_NAAM\"/g" android/app/build.gradle.kts
          sed -i "s/namespace = \".*\"/namespace = \"$ASLI_NAAM\"/g" android/app/build.gradle.kts

          # 6. Internet Permission (Taaki data load ho)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

          # 7. Firebase Plugins Setup
          sed -i '/plugins {/a \    id("com.google.gms.google-services") version "4.4.1" apply false' android/settings.gradle.kts
          sed -i '/plugins {/a \    id("com.google.gms.google-services")' android/app/build.gradle.kts

          # 8. Packages update aur Final Build
          flutter pub add firebase_core firebase_auth cloud_firestore cupertino_icons
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: Joyful-App-Ready-To-Launch
          path: build/app/outputs/flutter-apk/app-release.apk
