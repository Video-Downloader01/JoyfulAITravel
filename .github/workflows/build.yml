name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: cd joyful_travel_app && flutter clean
      - run: cd joyful_travel_app && rm -f pubspec.lock
      - run: cd joyful_travel_app && flutter pub get
      - run: cd joyful_travel_app && flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: joyful_travel_app/build/app/outputs/flutter-apk/app-release.apk
