name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Master Build Process
        run: |
          # 1. Purana kachra saaf karna
          rm -rf android
          
          # 2. Naya project STRICTLY chote aksharon wale naam ke sath banana
          flutter create --project-name=joyful_travel_app . --org com.joyful

          # 3. Firebase ki chabi sahi jagah rakhna
          find . -name "google-services.json" -exec cp {} android/app/ \;

          # 4. App ID Match karna
          sed -i 's/applicationId = ".*"/applicationId = "com.joyful.travelapp"/g' android/app/build.gradle.kts

          # 5. Internet Permission daalna (Black screen rokne ke liye)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

          # 6. Firebase Plugins ko naye format mein lagana
          sed -i '/plugins {/a \    id("com.google.gms.google-services") version "4.4.1" apply false' android/settings.gradle.kts
          sed -i '/plugins {/a \    id("com.google.gms.google-services")' android/app/build.gradle.kts

          # 7. Final Build
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: Joyful-Travel-App-Final
          path: build/app/outputs/flutter-apk/app-release.apk
